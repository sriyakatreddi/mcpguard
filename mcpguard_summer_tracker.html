<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer 2026 — MCPGuard + DSA Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f9f8; --surface: #ffffff; --surface2: #f3f2f0;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --red: #c0392b; --red-bg: #fdf0ef;
    --blue: #185fa5; --blue-bg: #e6f1fb;
    --green: #2d7a3a; --green-bg: #eaf3de;
    --amber: #8a4f0a; --amber-bg: #faeeda;
    --purple: #4a3db5; --purple-bg: #eeedfe;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
      --text: #f0f0ec; --text2: #b0b0aa; --text3: #707068;
      --red: #f09595; --red-bg: rgba(192,57,43,0.18);
      --blue: #85b7eb; --blue-bg: rgba(24,95,165,0.18);
      --green: #97c459; --green-bg: rgba(45,122,58,0.18);
      --amber: #ef9f27; --amber-bg: rgba(138,79,10,0.18);
      --purple: #afa9ec; --purple-bg: rgba(74,61,181,0.18);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .container { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
  .page-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 0.5px solid var(--border-strong); }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; letter-spacing: -0.3px; }
  .page-sub { font-size: 13px; color: var(--text3); }
  .phase-divider { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 16px 0 8px; border-top: 0.5px solid var(--border); margin-top: 8px; display: flex; align-items: center; gap: 10px; }
  .phase-divider span { white-space: nowrap; }
  .phase-line { flex: 1; height: 0.5px; background: var(--border); }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat-n { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .main-prog-wrap { background: var(--border); border-radius: 4px; height: 5px; margin-bottom: 8px; overflow: hidden; }
  .main-prog-fill { height: 100%; border-radius: 4px; background: var(--green); transition: width 0.4s ease; }
  .prog-label { font-size: 11px; color: var(--text3); margin-bottom: 24px; text-align: right; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .controls-left { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .reset-btn { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: none; color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }
  .week-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s; }
  .week-card:hover { border-color: var(--border-strong); }
  .week-card.hidden { display: none; }
  .week-header { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; transition: background 0.1s; }
  .week-header:hover { background: var(--surface2); }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; }
  .badge-gray { background: var(--surface2); color: var(--text3); border: 0.5px solid var(--border); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .week-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .week-dates { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .week-count { font-size: 11px; color: var(--text3); white-space: nowrap; min-width: 32px; text-align: right; }
  .chevron { width: 16px; height: 16px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }
  .mini-prog-wrap { height: 2px; background: var(--border); overflow: hidden; }
  .mini-prog-fill { height: 100%; background: var(--green); transition: width 0.3s; }
  .week-body { display: none; padding: 4px 16px 14px; }
  .week-body.open { display: block; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin: 14px 0 6px; }
  .task-row { display: flex; align-items: flex-start; gap: 9px; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
  .task-row:last-child { border-bottom: none; }
  .task-row input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; width: 14px; height: 14px; cursor: pointer; accent-color: var(--green); }
  .task-label { font-size: 12px; color: var(--text2); line-height: 1.5; cursor: pointer; flex: 1; transition: color 0.1s; }
  .task-label.done { color: var(--text3); text-decoration: line-through; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-left: 5px; vertical-align: middle; white-space: nowrap; flex-shrink: 0; }
  .tag-p { background: var(--red-bg); color: var(--red); }
  .tag-d { background: var(--blue-bg); color: var(--blue); }
  .tag-s { background: var(--green-bg); color: var(--green); }
  .tag-l { background: var(--amber-bg); color: var(--amber); }
  .deadline-note { font-size: 11px; color: var(--amber); background: var(--amber-bg); border-radius: var(--radius-sm); padding: 6px 10px; margin-bottom: 10px; }
  @media (max-width: 520px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .week-dates { display: none; } }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="page-title">Summer 2026 — MCPGuard + DSA</div>
    <div class="page-sub">Jun 13 → Aug 20 &nbsp;·&nbsp; Labelbox ends Jul 31 &nbsp;·&nbsp; CMU starts late August</div>
  </div>

  <div class="stats-grid">

    <div class="stat-card"><div class="stat-n" id="s-proj">0</div><div class="stat-l">project done</div></div>

  <div class="main-prog-wrap"><div class="main-prog-fill" id="main-prog" style="width:0%"></div></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Project (MCPGuard)</div>

    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>

  <div id="weeks-container"></div>
</div>

      ]},
      { label:'CMU prep', tasks:[
        {t:'Update resume: add MCPGuard bullet — "Built runtime MCP security gateway intercepting tool calls..."', tag:'p'},
        {t:'Update resume: add Labelbox finding bullet from internship POC', tag:'l'},
        {t:'Set recruiting calendar reminders: CMU career fair typically late September / early October', tag:'s'},
        {t:'Research 5 target companies for summer 2027 — confirm they recruit at CMU INI', tag:'s'},
      ]},
    ]
  },
];

function buildId(wid, si, ti) { return wid + '_' + si + '_' + ti; }
function saveState() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} }

function weekHasTags(week, filter) {
  if (filter === 'all') return true;
  return week.sections.some(s => s.tasks.some(t => t.tag === filter));
}

function renderWeeks() {
  const container = document.getElementById('weeks-container');
  container.innerHTML = '';
  weeks.forEach(week => {
    if (week.showPhase) {
      const div = document.createElement('div');
      div.className = 'phase-divider';
      div.innerHTML = `<span>${week.phase}</span><div class="phase-line"></div>`;
      container.appendChild(div);
    }

    let totalW = 0, doneW = 0;
    week.sections.forEach((s, si) => s.tasks.forEach((_, ti) => {
      totalW++; if (state[buildId(week.id, si, ti)]) doneW++;
    }));
    const pct = totalW ? Math.round(doneW / totalW * 100) : 0;
    const isOpen = week.open ?? false;
    const hidden = !weekHasTags(week, activeFilter) ? ' hidden' : '';

    const card = document.createElement('div');
    card.className = 'week-card' + hidden;
    card.id = 'card-' + week.id;

    const sectionsHtml = week.sections.map((s, si) => {
      const hasTasks = activeFilter === 'all' || s.tasks.some(t => t.tag === activeFilter);
      if (!hasTasks) return '';
      const tasksHtml = s.tasks.map((task, ti) => {
        const id = buildId(week.id, si, ti);
        const done = !!state[id];
        const tagLabel = {p:'project',d:'dsa',s:'milestone',l:'labelbox'}[task.tag];
        const hide = activeFilter !== 'all' && task.tag !== activeFilter ? ' style="display:none"' : '';
        return `<div class="task-row"${hide}>
          <input type="checkbox" id="${id}" ${done?'checked':''} onchange="toggle('${id}',this.checked)">
          <label for="${id}" class="task-label${done?' done':''}">${task.t}<span class="tag tag-${task.tag}">${tagLabel}</span></label>
        </div>`;
      }).join('');
      return `<div class="section-label">${s.label}</div>${tasksHtml}`;
    }).join('');

    card.innerHTML = `
      <div class="week-header" onclick="toggleWeek('${week.id}')">
        <span class="badge ${week.badge}">${week.badgeText}</span>
        <span class="week-title">${week.title}</span>
        <span class="week-dates">${week.dates}</span>
        <span class="week-count" id="count-${week.id}">${doneW}/${totalW}</span>
        <svg class="chevron${isOpen?' open':''}" id="chev-${week.id}" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="mini-prog-wrap"><div class="mini-prog-fill" id="mpf-${week.id}" style="width:${pct}%"></div></div>
      <div class="week-body${isOpen?' open':''}" id="body-${week.id}">${sectionsHtml}</div>`;
    container.appendChild(card);
  });
  updateStats();
}

function toggleWeek(wid) {
  const w = weeks.find(x => x.id === wid);
  if (w) w.open = !w.open;
  document.getElementById('body-' + wid).classList.toggle('open');
  document.getElementById('chev-' + wid).classList.toggle('open');
}

function toggle(id, val) {
  state[id] = val;
  saveState();
  const lbl = document.querySelector(`label[for="${id}"]`);
  if (lbl) lbl.classList.toggle('done', val);
  updateStats();
  updateWeekProgress();
}

function updateWeekProgress() {
  weeks.forEach(week => {
    let tw = 0, dw = 0;
    week.sections.forEach((s, si) => s.tasks.forEach((_, ti) => {
      tw++; if (state[buildId(week.id, si, ti)]) dw++;
    }));
    const pf = document.getElementById('mpf-' + week.id);
    const ct = document.getElementById('count-' + week.id);
    if (pf) pf.style.width = (tw ? Math.round(dw/tw*100) : 0) + '%';
    if (ct) ct.textContent = dw + '/' + tw;
  });
}

function updateStats() {
  let total=0,done=0,proj=0,projDone=0,dsa=0,dsaDone=0;
  weeks.forEach(week => week.sections.forEach((s,si) => s.tasks.forEach((task,ti) => {
    const chk = !!state[buildId(week.id,si,ti)];
    total++; if(chk) done++;
    if(['p','s','l'].includes(task.tag)){proj++;if(chk)projDone++;}
    if(task.tag==='d'){dsa++;if(chk)dsaDone++;}
  })));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-proj').textContent = projDone;
  document.getElementById('s-dsa').textContent = dsaDone;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('main-prog').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' of ' + total + ' tasks complete';
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWeeks();
}

function resetAll() {
  if (!confirm('Reset all checkboxes? This cannot be undone.')) return;
  state = {}; saveState();
  weeks.forEach(w => w.open = w.id === 'w0');
  renderWeeks();
}

weeks[0].open = true;
renderWeeks();
</script>
</body>
</html>
